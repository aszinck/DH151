<!DOCTYPE html>
<html>
<head>
	<title>Hello World</title>
	<meta charset="utf-8" />

	<!-- style sheets -->
	<link rel="stylesheet" href="css/style.css">

    <!-- Different libraries -->
    
    <!-- leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

</head>
<!-- This is how to write comments in html -->
<body>

	<div class="header">
		It is Friday
	</div>
	<div class="sidebar">
		My Sidebar
        <p>
            <a href="https://leafletjs.com/" target="_blank">
                <img src="https://leafletjs.com/docs/images/logo.png" width="100px">
            </a>
        </p>
	
        <table>
        <thead>
        <tr>
            <th>Animal</th> <th>Cuteness</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>Cat</td> <td>Very cute</td>
        </tr>
        <tr>
            <td>Rat</td> <td>Disgusting</td>
        </tr>
        </tbody>
    </table>
    
    </div>
	<div class="content">
		<div id="map"></div>
	</div>

    <script>
        var map = L.map('map').setView([34.0697,-118.4432], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        var marker = L.marker([34.0697,-118.4432]).addTo(map)
                .bindPopup('The Technology Sandbox<br> Where Yoh is sitting this very moment')
                .openPopup();	

        var marker = L.marker([35.0697,-119.4432]).addTo(map)
                .bindPopup('Somewhere')
                .openPopup();	
    </script>

</body>
</html>
